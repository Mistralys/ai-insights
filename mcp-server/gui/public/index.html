<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Server Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
  <script>
    (function () {
      var saved = localStorage.getItem('mcp-theme');
      if (saved !== 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="#/">Projects</a>
        <a href="#/insights">Insights</a>
        <a href="#/config">Configuration</a>
        <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Toggle dark mode"></button>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      <div id="app"></div>
    </div>
  </main>
  <script src="/libs/marked.min.js"></script>
  <script src="/api-client.js"></script>
  <script src="/theme.js"></script>
  <script src="/router.js"></script>
  <script src="/utils.js"></script>
  <script src="/views/project-list.js"></script>
  <script src="/views/project-detail.js"></script>
  <script src="/views/work-package.js"></script>
  <script src="/views/config.js"></script>
  <script src="/views/insights.js"></script>
  <script src="/views/run-log.js"></script>
  <script src="/stale-check.js"></script>
  <script src="/app.js"></script>
</body>
</html>
