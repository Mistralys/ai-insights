name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server-tests:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            mcp-server/package-lock.json
            personas/package-lock.json

      - name: Install personas dependencies (required by pretest)
        run: cd personas && npm ci

      - name: Install MCP server dependencies
        run: cd mcp-server && npm ci

      - name: Run MCP server tests
        run: cd mcp-server && npm test

  orchestrator-tests:
    name: Orchestrator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: personas/package-lock.json

      - name: Build personas (needed by orchestrator tests)
        run: cd personas && npm ci && cd .. && node scripts/build-personas.js

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install orchestrator dependencies
        run: cd orchestrator && pip install -e '.[dev]'

      - name: Run orchestrator tests
        run: cd orchestrator && pytest

  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install orchestrator dependencies
        run: cd orchestrator && pip install -e '.[dev]'

      - name: Run ruff
        run: cd orchestrator && ruff check src/

  manifest-validation:
    name: Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Validate workflow manifest
        run: node scripts/validate-workflow-manifest.js

  persona-build-check:
    name: Persona Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: personas/package-lock.json

      - name: Install personas dependencies
        run: cd personas && npm ci

      - name: Build all personas
        run: node scripts/build-personas.js

      - name: Verify persona build (note_only regression guard)
        run: node scripts/build-personas.js --check
