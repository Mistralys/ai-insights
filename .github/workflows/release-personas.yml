name: Release Personas

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Extract changelog entry
        id: changelog
        run: node scripts/extract-changelog-entry.js

      - name: Install personas dependencies
        run: cd personas && npm ci

      - name: Build and package standalone personas
        run: node scripts/package-personas.js --version ${{ steps.changelog.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.changelog.outputs.title }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ### Standalone ZIP Files

            All standalone personas (that do not need the ledger) are available as a separate download for Claude and VS Code.
          files: dist/ai-insights-personas-*.zip
