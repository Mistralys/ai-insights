<style>

  #outline-panel .outline-item.active { background: rgba(100, 181, 246, 0.12); color: #64b5f6; }
</style>
</head>
<body>
<div id="recipe-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close">ESC to close</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="persona-toggle" title="View Recipe Curator persona source">
  <span class="icon">📄</span>
</div>
<div id="persona-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Recipe Curator — Persona Source (Markdown)</h3>
      <button class="modal-close">ESC to close</button>
    </div>
    <div class="persona-meta">
      <span>📦 <span class="tag">v1.4.1</span></span>
      <span>📏 276 lines</span>
      <span>🎯 Standalone persona</span>
    </div>
    <pre class="persona-source" id="persona-source"></pre>
  </div>
</div>

<div id="outline-toggle" title="Slide outline">
  <span></span><span></span><span></span>
</div>
<div id="outline-panel"></div>

<div class="reveal">
<div class="slides">
<!-- BUILD:SLIDES -->
</div><!-- /.slides -->
</div><!-- /.reveal -->

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
<script>
Reveal.initialize({
  hash: true,
  slideNumber: 'c/t',
  width: 1280,
  height: 720,
  margin: 0.08,
  center: true,
  transition: 'slide',
  transitionSpeed: 'default',
  plugins: [RevealNotes, RevealHighlight]
}).then(() => {
  const toggle = document.getElementById('outline-toggle');
  const panel = document.getElementById('outline-panel');

  // Build outline from build-injected outline data
  const outlineData = /* BUILD:OUTLINE_DATA */;

  const allSections = document.querySelectorAll('.reveal .slides > section');
  let html = '';
  outlineData.forEach(s => {
    const sectionSlides = [];
    for (let i = s.startIndex; i < s.startIndex + s.count; i++) {
      const sec = allSections[i];
      if (!sec) continue;
      const h2 = sec.querySelector('h2');
      const title = h2 ? h2.textContent.trim() : null;
      if (title) sectionSlides.push({ index: i, title });
    }
    if (sectionSlides.length === 0) return;
    html += `<div class="outline-section">${s.label}</div>`;
    sectionSlides.forEach(sl => {
      html += `<a class="outline-item" data-index="${sl.index}">${sl.title}</a>`;
    });
  });
  panel.innerHTML = html;

  // Toggle
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    panel.classList.toggle('open');
  });

  // Navigate on click
  panel.addEventListener('click', (e) => {
    const item = e.target.closest('.outline-item');
    if (!item) return;
    Reveal.slide(parseInt(item.dataset.index, 10));
    toggle.classList.remove('open');
    panel.classList.remove('open');
  });

  // Highlight active
  function updateActive() {
    const idx = Reveal.getIndices().h;
    panel.querySelectorAll('.outline-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.index, 10) === idx);
    });
  }
  Reveal.on('slidechanged', updateActive);
  updateActive();

  // Recipe modal
  const recipeModal = document.getElementById('recipe-modal');
  const modalTitle = document.getElementById('modal-title');
  const modalBody = document.getElementById('modal-body');

  const recipes = {
    before: {
      label: 'Without Persona — Gemini Web',
      labelClass: 'modal-label-before',
      html: '/* BUILD:RECIPE_VANILLA */'
    },
    after: {
      label: 'With Recipe Curator — Gemini Web (Gem)',
      labelClass: 'modal-label-after',
      html: '/* BUILD:RECIPE_PERSONA */'
    }
  };

  document.querySelectorAll('[data-modal]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const which = el.dataset.modal;
      const recipe = recipes[which];
      modalTitle.innerHTML = `<span class="${recipe.labelClass}">${recipe.label}</span>`;
      modalBody.innerHTML = recipe.html;
      recipeModal.classList.add('open');
    });
  });

  recipeModal.addEventListener('click', (e) => {
    if (e.target === recipeModal || e.target.closest('.modal-close')) {
      recipeModal.classList.remove('open');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && recipeModal.classList.contains('open')) {
      recipeModal.classList.remove('open');
      e.stopImmediatePropagation();
    }
  }, true);

  // Persona source modal
  const personaModal = document.getElementById('persona-modal');
  const personaToggle = document.getElementById('persona-toggle');
  const personaSource = document.getElementById('persona-source');

  // The full Recipe Curator persona source (Markdown)
  const personaMarkdown = '/* BUILD:PERSONA_SOURCE */';

  personaSource.textContent = personaMarkdown;

  personaToggle.addEventListener('click', () => {
    personaModal.classList.add('open');
  });

  personaModal.addEventListener('click', (e) => {
    if (e.target === personaModal || e.target.closest('.modal-close')) {
      personaModal.classList.remove('open');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && personaModal.classList.contains('open')) {
      personaModal.classList.remove('open');
      e.stopImmediatePropagation();
    }
  }, true);
});
</script>
</body>
</html>
