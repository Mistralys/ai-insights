moduleMetaData:
  id: "orchestrator"
  label: "Orchestrator"
  description: "LangGraph + Deep Agents headless pipeline executor - deterministic alternative to IDE-based agent workflows."
  keywords:
    - LangGraph
    - Deep Agents
    - headless pipeline
    - orchestrator
  relatedModules:
    - mcp-server
    - personas

documents:
  - description: 'Orchestrator - Overview'
    outputPath: 'orchestrator/overview.md'
    sources:
      - type: text
        content: |
          # Orchestrator - Overview
          README for the LangGraph + Deep Agents headless pipeline executor: architecture overview, quick-start, and usage guide.
      - type: file
        description: "Overview"
        sourcePaths:
          - README.md
        filePattern: "README.md"

  - description: 'Orchestrator - Manifest'
    outputPath: 'orchestrator/manifest.md'
    sources:
      - type: text
        content: |
          # Orchestrator - Project Manifest
          Complete project manifest: tech stack, architectural constraints, API surface, data flows, and file tree for the orchestrator module.
      - type: file
        description: "Project manifest (overview, tech stack, constraints, API surface, architecture)"
        sourcePaths:
          - docs/agents/project-manifest
        filePattern: "*.md"

  - description: 'Orchestrator - Documentation'
    outputPath: 'orchestrator/documentation.md'
    sources:
      - type: text
        content: |
          # Orchestrator - Technical Documentation
          Deep-dive docs: routing architecture, JSONL log schema, smoke test guide, and public API reference.
      - type: file
        description: "Technical deep-dives (architecture, routing, log schema, smoke tests, public API)"
        sourcePaths:
          - docs
        filePattern: "*.md"
        notPath:
          - 'agents/'

  - description: 'Orchestrator - File Structure'
    outputPath: 'orchestrator/file-structure.md'
    sources:
      - type: text
        content: |
          # Orchestrator - File Structure
          Directory tree of the orchestrator module. Runtime artifacts (pycache, venv, logs, checkpoints) are excluded.
      - type: tree
        description: 'Directory tree'
        sourcePaths:
          - ./
        filePattern: '*'
        renderFormat: ascii
        maxDepth: 8
        notPath:
          - '__pycache__/'
          - '.venv/'
          - '.pytest_cache/'
          - 'checkpoints/'
          - '*.pyc'
          - 'logs/'
          - 'dist/'

  - description: 'Orchestrator - Tests'
    outputPath: 'orchestrator/tests.md'
    sources:
      - type: text
        content: |
          # Orchestrator - Tests
          Directory tree of the pytest test suite. Use to locate test files before running or editing them.
      - type: tree
        description: 'Test suite directory structure'
        sourcePaths:
          - tests
        filePattern: '*'
        renderFormat: ascii
        maxDepth: 3
        notPath:
          - '__pycache__/'
