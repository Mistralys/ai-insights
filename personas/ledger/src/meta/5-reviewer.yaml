number: 5
role: Reviewer
vs_file_name: 5-reviewer.agent.md
cc_file_name: 5-reviewer.md

tools:
  - vscode
  - execute
  - read
  - edit
  - search
  - web
  - agent
  - todo
  - central_pm/*

has_mcp: true
has_detect_project: true
self_documenting_note: true
has_incident_logging: false

mcp_tools:
  - tool: ledger_detect_project
    purpose: Detect the active project from the current workspace path.
  - tool: ledger_get_project_status
    purpose: "Retrieve project status summary (also used to verify MCP server reachability)."
  - tool: ledger_get_next_action
    purpose: "Get your next task (`RUN_REVIEW`, `REWORK_REVIEW`, or `WAIT`)."
  - tool: ledger_get_work_package
    purpose: Read WP detail including implementation and QA pipeline artifacts.
  - tool: ledger_start_pipeline
    purpose: "Begin the `code-review` pipeline for a WP."
  - tool: ledger_complete_pipeline
    purpose: Finalize pipeline with status, summary, metrics, and comments.
  - tool: ledger_add_project_comment
    purpose: Add project-level comments for cross-cutting architectural insights.
  - tool: ledger_get_handoff_status
    purpose: Compute the AGENT/STATUS handoff block at the end of your turn.
